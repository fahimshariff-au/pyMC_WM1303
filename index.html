<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WM1303 (SX1303/SX1302) module for Meshcore (pyMC_core & pyMC_repeater)</title>
  <meta name="description" content="Turn a Raspberry Pi with an SX1302/SX1303 LoRa concentrator into a multi-channel MeshCore gateway bridge with per-channel radio config, hardware CAD, LBT, advanced bridge rules, spectrum analysis, and a full web management UI.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #1c2333;
      --border: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-link: #58a6ff;
      --accent: #1f6feb;
      --accent-subtle: #388bfd26;
      --green: #3fb950;
      --orange: #d29922;
      --red: #f85149;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* Header bar */
    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      background: rgba(22, 27, 34, 0.95);
    }
    .header .container {
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-icon { font-size: 28px; }
    .header-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .header-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-left: auto;
    }
    .header-subtitle a {
      color: var(--text-link);
      text-decoration: none;
    }
    .header-subtitle a:hover { text-decoration: underline; }

    /* Markdown content styling */
    #content {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 40px;
      margin-top: 24px;
    }

    #content h1 {
      font-size: 2em;
      font-weight: 600;
      padding-bottom: 0.3em;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    #content h2 {
      font-size: 1.5em;
      font-weight: 600;
      padding-bottom: 0.3em;
      border-bottom: 1px solid var(--border);
      margin-top: 24px;
      margin-bottom: 16px;
    }
    #content h3 {
      font-size: 1.25em;
      font-weight: 600;
      margin-top: 24px;
      margin-bottom: 16px;
    }
    #content h4 {
      font-size: 1em;
      font-weight: 600;
      margin-top: 24px;
      margin-bottom: 16px;
    }

    #content p {
      margin-bottom: 16px;
    }

    #content a {
      color: var(--text-link);
      text-decoration: none;
    }
    #content a:hover { text-decoration: underline; }

    #content strong { font-weight: 600; }

    #content ul, #content ol {
      padding-left: 2em;
      margin-bottom: 16px;
    }
    #content li {
      margin-bottom: 4px;
    }
    #content li + li { margin-top: 4px; }

    #content code {
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 85%;
      background: rgba(110, 118, 129, 0.15);
      padding: 0.2em 0.4em;
      border-radius: 6px;
    }

    #content pre {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      overflow-x: auto;
      margin-bottom: 16px;
      line-height: 1.45;
    }
    #content pre code {
      background: none;
      padding: 0;
      font-size: 85%;
      color: var(--text-primary);
    }

    #content blockquote {
      border-left: 4px solid var(--accent);
      padding: 0.5em 1em;
      margin-bottom: 16px;
      color: var(--text-secondary);
      background: var(--accent-subtle);
      border-radius: 0 6px 6px 0;
    }
    #content blockquote p { margin-bottom: 0; }
    #content blockquote strong { color: var(--text-primary); }

    #content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
      overflow-x: auto;
      display: block;
    }
    #content thead { background: var(--bg-tertiary); }
    #content th, #content td {
      border: 1px solid var(--border);
      padding: 8px 13px;
      text-align: left;
    }
    #content th {
      font-weight: 600;
      background: var(--bg-tertiary);
    }
    #content tr:nth-child(even) { background: rgba(110, 118, 129, 0.05); }

    #content img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
    }

    /* Screenshot grid — override HTML table from README */
    #content table img {
      border-radius: 6px;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    #content table img:hover {
      transform: scale(1.03);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    #content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 32px 0;
      color: var(--text-secondary);
      font-size: 13px;
    }
    .footer a {
      color: var(--text-link);
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }

    /* Loading state */
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text-secondary);
    }
    .loading-spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 768px) {
      #content { padding: 24px 16px; }
      .container { padding: 16px; }
      .header-subtitle { display: none; }
    }

    /* Lightbox for screenshots */
    .lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 1000;
      cursor: zoom-out;
      align-items: center;
      justify-content: center;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 8px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="container">
      <span class="header-icon">📡</span>
      <span class="header-title">WM1303 (SX1303/SX1302) module for Meshcore (pyMC_core & pyMC_repeater)</span>
      <span class="header-subtitle">
        <a href="https://github.com/HansvanMeer/pyMC_WM1303" target="_blank">View on GitHub →</a>
      </span>
    </div>
  </div>

  <div class="container">
    <div id="content">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p style="margin-top: 16px;">Loading documentation…</p>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="container">
      <p>© 2026 <a href="https://github.com/HansvanMeer" target="_blank">HansvanMeer</a> · Licensed under <a href="LICENSE">PolyForm Noncommercial 1.0.0</a></p>
    </div>
  </div>

  <!-- Lightbox overlay -->
  <div class="lightbox" id="lightbox" onclick="this.classList.remove('active')">
    <img id="lightbox-img" src="" alt="">
  </div>

  <script>
    marked.setOptions({
      gfm: true,
      breaks: false,
      headerIds: true
    });

    async function loadReadme() {
      const el = document.getElementById('content');
      try {
        const resp = await fetch('README.md?v=' + Date.now());
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const md = await resp.text();
        el.innerHTML = marked.parse(md);

        // Add click-to-zoom on screenshot images
        el.querySelectorAll('img').forEach(img => {
          img.addEventListener('click', (e) => {
            e.preventDefault();
            const lb = document.getElementById('lightbox');
            document.getElementById('lightbox-img').src = img.src;
            lb.classList.add('active');
          });
        });
      } catch (err) {
        el.innerHTML = `
          <div class="loading">
            <p><strong>Could not load README.md</strong></p>
            <p style="margin-top: 8px; color: var(--text-secondary);">Visit the
              <a href="https://github.com/HansvanMeer/pyMC_WM1303" target="_blank">GitHub repository</a>
              for full documentation.</p>
          </div>`;
      }
    }

    loadReadme();
  </script>
</body>
</html>
