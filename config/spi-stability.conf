# =============================================================================
# SPI Bus Stability Configuration for WM1303
# =============================================================================
# This file documents the SPI stability optimizations applied by the installer.
# These settings reduce jitter and latency on the SPI bus used by the SX1302/SX1303
# LoRa concentrator, resulting in more reliable radio communication.
#
# Applied automatically by install.sh and upgrade.sh.
# Runtime settings are re-applied at every service start via spi_optimize.sh.
# =============================================================================

# --- /boot/firmware/config.txt ---
# core_freq_min=500
#   Prevents the VPU/GPU core clock from scaling below 500 MHz.
#   SPI clock = core_freq / CDIV. If core_freq drops to 200 MHz (default min),
#   the SPI clock drops from 4 MHz to ~1.6 MHz, causing timing errors.
#   This is the single most important SPI stability setting.

# --- /etc/modprobe.d/spi-bcm2835-opts.conf ---
# options spi_bcm2835 polling_limit_us=250
#   Raises the polling mode threshold from 30us (default) to 250us.
#   At 4 MHz SPI, this means transfers up to ~111 bytes use CPU polling
#   instead of interrupt mode, eliminating the interrupt-mode jitter gap.
#   Most HAL register operations are 1-16 bytes (already in polling mode),
#   but this ensures medium-sized transfers also benefit.

# --- CPU governor: performance ---
# Set via spi_optimize.sh at service start.
#   Locks ARM CPU frequency at maximum, eliminating frequency transition
#   latency that can cause scheduling jitter.

# --- CPU isolation (multi-core only) ---
# Optional: isolcpus=N nohz_full=N rcu_nocbs=N in /boot/firmware/cmdline.txt
#   Dedicates a CPU core for SPI/lora_pkt_fwd processing.
#   Not applied automatically (requires reboot and careful consideration).
#   See docs/hardware.md for details.
